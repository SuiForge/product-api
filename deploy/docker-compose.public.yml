services:
  product-api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: sui-alert-ops:latest
    restart: unless-stopped
    env_file:
      - ../.env.production
    environment:
      PRODUCT_API_PORT: 8088
      PRODUCT_API_DATA_FILE: /app/data/product-api-state.json
    volumes:
      - product_api_data:/app/data
    expose:
      - "8088"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8088/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      product-api:
        condition: service_healthy
    env_file:
      - ../.env.production
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      APP_UPSTREAM: product-api:8088
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  product_api_data:
  caddy_data:
  caddy_config:

